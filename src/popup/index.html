<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Knots</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body class="w-80 bg-gray-950 text-gray-100 p-4 font-sans">
    <!-- Logged-out state -->
    <div id="logged-out" class="hidden flex flex-col items-center gap-4 py-6">
      <div class="flex items-center gap-2">
        <h1 class="text-xl font-bold tracking-tight">Knots</h1>
        <a href="https://github.com/ashahrior/knots" target="_blank" rel="noopener noreferrer" title="GitHub" class="text-gray-400 hover:text-gray-200 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
        </a>
      </div>
      <p class="text-sm text-gray-400">Save pages to Google Sheets</p>
      <button
        id="btn-login"
        class="w-full bg-blue-600 hover:bg-blue-500 text-white font-medium py-2 px-4 rounded-lg transition-colors cursor-pointer"
      >
        Sign in with Google
      </button>
    </div>

    <!-- Logged-in state -->
    <div id="logged-in" class="hidden flex flex-col gap-3">
      <!-- Main view -->
      <div id="view-main" class="flex flex-col gap-3">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-1.5">
            <h1 class="text-lg font-bold tracking-tight">Knots</h1>
            <a href="https://github.com/ashahrior/knots" target="_blank" rel="noopener noreferrer" title="GitHub" class="text-gray-400 hover:text-gray-200 transition-colors">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
            </a>
          </div>
          <div class="flex items-center gap-2">
            <span id="user-email" class="text-xs text-gray-400 truncate max-w-[140px]"></span>
            <button
              id="btn-settings"
              title="Settings"
              class="text-gray-400 hover:text-gray-200 transition-colors cursor-pointer"
            >
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <button
          id="btn-save"
          class="w-full bg-green-600 hover:bg-green-500 text-white font-medium py-2 px-4 rounded-lg transition-colors cursor-pointer"
        >
          Save Current Page
        </button>

        <a
          id="link-sheet"
          href="#"
          target="_blank"
          rel="noopener noreferrer"
          class="block text-center text-sm text-blue-400 hover:text-blue-300 transition-colors"
        >
          Open Knots Spreadsheet ↗
        </a>

        <hr class="border-gray-800" />

        <button
          id="btn-logout"
          class="w-full text-sm text-gray-400 hover:text-red-400 transition-colors cursor-pointer"
        >
          Logout
        </button>
      </div>

      <!-- Settings view -->
      <div id="view-settings" class="hidden flex flex-col gap-4">
        <div class="flex items-center gap-2">
          <button
            id="btn-back"
            title="Back"
            class="text-gray-400 hover:text-gray-200 transition-colors cursor-pointer"
          >
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="m15 18-6-6 6-6"/>
            </svg>
          </button>
          <h2 class="text-lg font-bold tracking-tight">Settings</h2>
        </div>

        <!-- Sheet Name -->
        <div>
          <label for="sheet-name" class="block text-xs font-medium text-gray-300 mb-1">
            Default Sheet Name
          </label>
          <div class="flex gap-2">
            <input
              id="sheet-name"
              type="text"
              list="sheet-list"
              placeholder="Default"
              class="flex-1 bg-gray-900 border border-gray-700 rounded-lg px-3 py-1.5 text-sm text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500"
            />
            <datalist id="sheet-list"></datalist>
            <button
              id="btn-save-sheet"
              class="bg-blue-600 hover:bg-blue-500 text-white font-medium text-sm px-3 py-1.5 rounded-lg transition-colors cursor-pointer"
            >
              Save
            </button>
          </div>
          <p id="sheet-status" class="text-xs text-gray-500 mt-1"></p>
        </div>

        <!-- Smart Categorization -->
        <div class="flex items-center justify-between">
          <div>
            <h3 class="text-xs font-medium text-gray-300">Smart Categorization</h3>
            <p class="text-xs text-gray-500 mt-0.5">
              Auto-detect content type
            </p>
          </div>
          <label class="relative inline-flex items-center cursor-pointer">
            <input id="toggle-smart" type="checkbox" class="sr-only peer" checked />
            <div
              class="w-9 h-5 bg-gray-700 rounded-full peer peer-checked:bg-blue-600 peer-focus:ring-2 peer-focus:ring-blue-500 after:content-[''] after:absolute after:top-0.5 after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:after:translate-x-full"
            ></div>
          </label>
        </div>

        <!-- Clear Cache -->
        <div>
          <button
            id="btn-clear-cache"
            class="bg-gray-800 hover:bg-gray-700 text-gray-300 font-medium text-xs px-3 py-1.5 rounded-lg transition-colors cursor-pointer"
          >
            Clear Local Cache
          </button>
          <p id="cache-status" class="text-xs text-gray-500 mt-1"></p>
        </div>
      </div>
    </div>

    <!-- Loading / status -->
    <div id="status" class="hidden text-center text-sm text-gray-400 py-6">
      Loading…
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
