<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Soko</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body class="w-80 bg-gray-950 text-gray-100 p-4 font-sans">
    <!-- Logged-out state -->
    <div id="logged-out" class="hidden flex flex-col items-center gap-4 py-6">
      <h1 class="text-xl font-bold tracking-tight">Soko</h1>
      <p class="text-sm text-gray-400">Save pages to Google Sheets</p>
      <button
        id="btn-login"
        class="w-full bg-blue-600 hover:bg-blue-500 text-white font-medium py-2 px-4 rounded-lg transition-colors cursor-pointer"
      >
        Sign in with Google
      </button>
    </div>

    <!-- Logged-in state -->
    <div id="logged-in" class="hidden flex flex-col gap-3">
      <div class="flex items-center justify-between">
        <h1 class="text-lg font-bold tracking-tight">Soko</h1>
        <div class="flex items-center gap-2">
          <span id="user-email" class="text-xs text-gray-400 truncate max-w-[140px]"></span>
          <button
            id="btn-settings"
            title="Settings"
            class="text-gray-400 hover:text-gray-200 transition-colors cursor-pointer"
          >
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <button
        id="btn-save"
        class="w-full bg-green-600 hover:bg-green-500 text-white font-medium py-2 px-4 rounded-lg transition-colors cursor-pointer"
      >
        Save Current Page
      </button>

      <a
        id="link-sheet"
        href="#"
        target="_blank"
        rel="noopener noreferrer"
        class="block text-center text-sm text-blue-400 hover:text-blue-300 transition-colors"
      >
        Open Soko Spreadsheet ↗
      </a>

      <hr class="border-gray-800" />

      <button
        id="btn-logout"
        class="w-full text-sm text-gray-400 hover:text-red-400 transition-colors cursor-pointer"
      >
        Logout
      </button>
    </div>

    <!-- Loading / status -->
    <div id="status" class="hidden text-center text-sm text-gray-400 py-6">
      Loading…
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
